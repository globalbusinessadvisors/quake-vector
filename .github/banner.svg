<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7c948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Seismograph waveform background -->
  <path d="M 0 200 Q 30 200 60 198 T 120 195 T 180 200 T 240 202 T 300 200 T 360 190 T 390 150 T 410 100 T 425 60 T 440 120 T 455 180 T 470 220 T 485 240 T 500 200 T 520 170 T 535 140 T 548 185 T 560 210 T 580 200 T 620 198 T 680 200 T 740 200 T 800 198 T 860 200 T 920 195 T 960 180 T 980 160 T 995 130 T 1010 170 T 1025 200 T 1060 210 T 1080 200 T 1120 198 T 1160 200 T 1200 200"
        fill="none" stroke="url(#wave)" stroke-width="2.5" stroke-opacity="0.35" filter="url(#glow)"/>

  <!-- Secondary waveform -->
  <path d="M 0 210 Q 40 210 80 208 T 160 210 T 240 212 T 320 210 T 380 205 T 410 180 T 430 140 T 445 110 T 460 150 T 478 200 T 495 225 T 510 235 T 530 215 T 545 195 T 558 210 T 580 215 T 620 210 T 700 210 T 780 210 T 860 208 T 920 210 T 970 200 T 990 180 T 1005 155 T 1020 185 T 1035 210 T 1060 215 T 1100 210 T 1160 210 T 1200 210"
        fill="none" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- HNSW graph nodes -->
  <g fill="url(#accent)" fill-opacity="0.15" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.3">
    <circle cx="100" cy="80" r="4"/>
    <circle cx="140" cy="65" r="3"/>
    <circle cx="165" cy="90" r="5"/>
    <circle cx="120" cy="105" r="3"/>
    <circle cx="185" cy="75" r="4"/>
    <line x1="100" y1="80" x2="140" y2="65"/>
    <line x1="140" y1="65" x2="165" y2="90"/>
    <line x1="165" y1="90" x2="185" y2="75"/>
    <line x1="100" y1="80" x2="120" y2="105"/>
    <line x1="120" y1="105" x2="165" y2="90"/>

    <circle cx="1020" cy="70" r="4"/>
    <circle cx="1060" cy="55" r="3"/>
    <circle cx="1085" cy="80" r="5"/>
    <circle cx="1040" cy="95" r="3"/>
    <circle cx="1105" cy="65" r="4"/>
    <line x1="1020" y1="70" x2="1060" y2="55"/>
    <line x1="1060" y1="55" x2="1085" y2="80"/>
    <line x1="1085" y1="80" x2="1105" y2="65"/>
    <line x1="1020" y1="70" x2="1040" y2="95"/>
    <line x1="1040" y1="95" x2="1085" y2="80"/>
  </g>

  <!-- Logo icon: seismograph needle -->
  <g transform="translate(100, 130)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-opacity="0.8"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="5" fill="#4ecdc4" fill-opacity="0.9"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="16" y2="-14" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="0" y1="-25" x2="0" y2="-21" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="25" y1="0" x2="21" y2="0" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="0" y1="25" x2="0" y2="21" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="-25" y1="0" x2="-21" y2="0" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="160" y="128" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    QuakeVector
  </text>

  <!-- Subtitle -->
  <text x="162" y="160" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="16" fill="#4ecdc4" fill-opacity="0.9" letter-spacing="3">
    REAL-TIME SEISMIC DETECTION ENGINE
  </text>

  <!-- Tag pills -->
  <g transform="translate(162, 178)">
    <rect x="0" y="0" width="52" height="22" rx="4" fill="#ff6b35" fill-opacity="0.15" stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="26" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#ff6b35" text-anchor="middle" fill-opacity="0.9">Rust</text>

    <rect x="62" y="0" width="60" height="22" rx="4" fill="#4ecdc4" fill-opacity="0.15" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="92" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#4ecdc4" text-anchor="middle" fill-opacity="0.9">HNSW</text>

    <rect x="132" y="0" width="52" height="22" rx="4" fill="#f7c948" fill-opacity="0.15" stroke="#f7c948" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="158" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#f7c948" text-anchor="middle" fill-opacity="0.9">GNN</text>

    <rect x="194" y="0" width="78" height="22" rx="4" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="233" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" text-anchor="middle" fill-opacity="0.9">Real-time</text>
  </g>
</svg>
