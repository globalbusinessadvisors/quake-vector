<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e85d26;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6fdb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0b530;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" font-family="'SF Pro Display', system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle" fill-opacity="0.9" letter-spacing="2">DATA FLOW ARCHITECTURE</text>

  <!-- Row 1: Sensors → Ingestion → Embedding -->
  <!-- Sensors -->
  <rect x="30" y="60" width="140" height="56" rx="8" fill="#ff6b35" fill-opacity="0.12" stroke="#ff6b35" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="100" y="84" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#ff6b35" text-anchor="middle">Sensors</text>
  <text x="100" y="104" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">ingestion</text>

  <!-- Arrow -->
  <line x1="175" y1="88" x2="220" y2="88" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3" marker-end="url(#arrowhead)"/>
  <polygon points="218,84 228,88 218,92" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Ring Buffer -->
  <rect x="230" y="60" width="140" height="56" rx="8" fill="#ff6b35" fill-opacity="0.12" stroke="#ff6b35" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="300" y="84" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#ff6b35" text-anchor="middle">Ring Buffer</text>
  <text x="300" y="104" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">WaveformWindow</text>

  <!-- Arrow -->
  <polygon points="368,84 378,88 368,92" fill="#ffffff" fill-opacity="0.3"/>
  <line x1="375" y1="88" x2="420" y2="88" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Embedding -->
  <rect x="430" y="60" width="140" height="56" rx="8" fill="#4ecdc4" fill-opacity="0.12" stroke="#4ecdc4" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="500" y="84" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#4ecdc4" text-anchor="middle">Embedding</text>
  <text x="500" y="104" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">FFT + Features</text>

  <!-- Arrow -->
  <polygon points="568,84 578,88 568,92" fill="#ffffff" fill-opacity="0.3"/>
  <line x1="575" y1="88" x2="620" y2="88" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- SeismicEmbedding output -->
  <rect x="630" y="60" width="140" height="56" rx="8" fill="#4ecdc4" fill-opacity="0.08" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/>
  <text x="700" y="84" font-family="'SF Mono', monospace" font-size="12" font-weight="500" fill="#4ecdc4" text-anchor="middle" fill-opacity="0.8">SeismicEmbedding</text>
  <text x="700" y="104" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">[f32; 256]</text>

  <!-- Vertical arrow down from SeismicEmbedding -->
  <line x1="700" y1="120" x2="700" y2="160" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>
  <polygon points="696,158 700,168 704,158" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Row 2: HNSW Graph -->
  <rect x="530" y="170" width="340" height="56" rx="8" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="700" y="194" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">HNSW Graph</text>
  <text x="700" y="214" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">vector-store  |  Insert + k-NN Search</text>

  <!-- Vertical arrow down -->
  <line x1="700" y1="230" x2="700" y2="270" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>
  <polygon points="696,268 700,278 704,268" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Row 3: GNN + SONA side by side -->
  <!-- GNN -->
  <rect x="530" y="280" width="160" height="56" rx="8" fill="#f7c948" fill-opacity="0.12" stroke="#f7c948" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="610" y="304" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#f7c948" text-anchor="middle">GNN Inference</text>
  <text x="610" y="324" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">learning</text>

  <!-- SONA -->
  <rect x="710" y="280" width="160" height="56" rx="8" fill="#f7c948" fill-opacity="0.12" stroke="#f7c948" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="790" y="304" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#f7c948" text-anchor="middle">SONA Adapt</text>
  <text x="790" y="324" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">adaptation</text>

  <!-- Bidirectional arrow between GNN and SONA -->
  <line x1="694" y1="308" x2="706" y2="308" stroke="#f7c948" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Arrow down from GNN -->
  <line x1="610" y1="340" x2="610" y2="380" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>
  <polygon points="606,378 610,388 614,378" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Prediction output -->
  <rect x="530" y="340" width="160" height="0" rx="8" fill="none"/>

  <!-- Row 4: Alert Engine -->
  <rect x="430" y="390" width="340" height="56" rx="8" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="600" y="414" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Alert Engine</text>
  <text x="600" y="434" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">alert  |  Thresholds + Consensus + Cooldown</text>

  <!-- Arrow down -->
  <line x1="600" y1="450" x2="600" y2="480" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>
  <polygon points="596,478 600,488 604,478" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Row 5: Outputs -->
  <rect x="430" y="460" width="100" height="40" rx="6" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="480" y="484" font-family="'SF Mono', monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Dashboard</text>

  <rect x="545" y="460" width="100" height="40" rx="6" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="595" y="484" font-family="'SF Mono', monospace" font-size="10" fill="#3b82f6" text-anchor="middle">Mesh Peers</text>

  <rect x="660" y="460" width="100" height="40" rx="6" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="710" y="484" font-family="'SF Mono', monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GPIO / Relay</text>

  <!-- Left column: Infrastructure -->
  <!-- Persistence -->
  <rect x="30" y="170" width="200" height="56" rx="8" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="130" y="194" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Persistence</text>
  <text x="130" y="214" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">WAL + Checkpoints</text>

  <!-- Container -->
  <rect x="30" y="250" width="200" height="56" rx="8" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="130" y="274" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Container</text>
  <text x="130" y="294" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">Boot + Watchdog + Degrade</text>

  <!-- Network -->
  <rect x="30" y="330" width="200" height="56" rx="8" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="130" y="354" font-family="'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Network</text>
  <text x="130" y="374" font-family="'SF Mono', monospace" font-size="10" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">Mesh + Upstream + API</text>

  <!-- Dotted connections from infra to main pipeline -->
  <line x1="234" y1="198" x2="526" y2="198" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="234" y1="278" x2="526" y2="198" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="234" y1="358" x2="426" y2="418" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <g transform="translate(30, 430)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#ff6b35" fill-opacity="0.5"/>
    <text x="16" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Ingestion</text>
    <rect x="80" y="0" width="10" height="10" rx="2" fill="#4ecdc4" fill-opacity="0.5"/>
    <text x="96" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Embedding</text>
    <rect x="165" y="0" width="10" height="10" rx="2" fill="#a78bfa" fill-opacity="0.5"/>
    <text x="181" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Graph</text>
    <rect x="225" y="0" width="10" height="10" rx="2" fill="#f7c948" fill-opacity="0.5"/>
    <text x="241" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Learning</text>
    <rect x="305" y="0" width="10" height="10" rx="2" fill="#ef4444" fill-opacity="0.5"/>
    <text x="321" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Alert</text>
    <rect x="362" y="0" width="10" height="10" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
    <text x="378" y="9" font-family="'SF Mono', monospace" font-size="9" fill="#ffffff" fill-opacity="0.5">Infrastructure</text>
  </g>
</svg>
